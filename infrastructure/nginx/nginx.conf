# Optional production reverse proxy for VastHost OS.
#
# In Phase 0 the Next.js container binds 0.0.0.0:8111 directly and proxies
# /api/* to the FastAPI service via next.config rewrites, which already
# satisfies the LAN-access requirement. This config is provided for hosts who
# prefer to terminate everything behind a single Nginx front (e.g. to add TLS).
#
# To use it, add an `nginx` service to docker-compose mapping 80:80 and mount
# this file at /etc/nginx/nginx.conf.

worker_processes auto;

events {
  worker_connections 1024;
}

http {
  sendfile on;
  upstream web {
    server web:8111;
  }
  upstream api {
    server api:8000;
  }

  server {
    listen 80;
    server_name _;

    # API passes straight through (Next also proxies, but this lets external
    # tools hit the API without the dashboard).
    location /api/ {
      proxy_pass http://api/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
      proxy_pass http://web;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
