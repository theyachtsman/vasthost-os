services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-vasthost}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-vasthost}"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      # Host publish is for debugging only; override if the port is taken.
      - "${POSTGRES_HOST_PORT:-5432}:5432"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "${REDIS_HOST_PORT:-6379}:6379"

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/vasthost}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Run migrations then start the API
    command: >
      sh -c "alembic upgrade head &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health').status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 10
    ports:
      # Host publish is for debugging only; the web container reaches the API
      # over the internal Docker network (api:8000) regardless of this mapping.
      - "${API_HOST_PORT:-8000}:8000"

  worker:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/vasthost}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      api:
        condition: service_healthy
    command: celery -A worker.celery_app worker --loglevel=info --concurrency=2

  beat:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql+psycopg://postgres:postgres@postgres:5432/vasthost}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    depends_on:
      api:
        condition: service_healthy
    command: celery -A worker.celery_app beat --loglevel=info

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      API_INTERNAL_URL: ${API_INTERNAL_URL:-http://api:8000}
      NODE_ENV: production
      PORT: "8111"
      HOSTNAME: "0.0.0.0"
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8111}:8111"

volumes:
  postgres-data:
  redis-data:
